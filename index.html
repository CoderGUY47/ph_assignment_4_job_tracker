<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- DaisyUI and Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Job Application Tracker</title>
  <link rel="shortcut icon" type="image/x-icon" href="/jobs.png">
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    * {
      font-family: 'Outfit', sans-serif;
    }
    .btn-tab.active{
      @apply bg-purple-600 text-white shadow-md border border-violet-600;
    }
    .btn-tab:not(.active) {
      @apply bg-[#2a2a2a] text-gray-300 border border-gray-600/50 hover:bg-gray-700 hover:text-white;
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-tl from-black/70 via-gray-900/50 to-black/70 text-white">
  <div class="max-w-5xl mx-auto px-4 py-10">
    <header class="mb-12 flex gap-3">
      <img src="/jobs.png" class="size-10" alt="">
      <h1 class="text-3xl font-bold text-white">Job Application Tracker</h1>
    </header>

    <!-- \\\===status-panel===/// -->
    <section class="status-panel grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div onclick="switchTab('all')" id="all-stat"
        class="status-card p-6 flex flex-col gap-x-4 bg-gradient-to-br from-white/10 to-gray-900/10 shadow-md backdrop-blur-xl border-0 border-white/20 rounded-2xl">
        <h6 class="text-gray-400 text-sm font-normal uppercase tracking-wide">Total Jobs</h6>
        <p id="total-count" class="text-4xl font-bold text-purple-500">8</p>
      </div>
      <div onclick="switchTab('interview')" id="interview-stat"
        class="status-card p-6 flex flex-col gap-x-4 bg-gradient-to-br from-white/10 to-gray-900/10 shadow-md backdrop-blur-xl border-0 border-white/20 rounded-2xl">
        <h6 class="text-gray-400 text-sm font-normal uppercase tracking-wide">Interview Jobs</h6>
        <p id="interview-count" class="text-4xl font-bold text-indigo-500">0</p>
      </div>
      <div onclick="switchTab('rejected')" id="rejected-stat"
        class="status-card p-6 flex flex-col gap-x-4 bg-gradient-to-br from-white/10 to-gray-900/10 shadow-md backdrop-blur-xl border-0 border-white/20 rounded-2xl">
        <h6 class="text-gray-400 text-sm font-normal uppercase tracking-wide">Rejected Jobs</h6>
        <p id="rejected-count" class="text-4xl font-bold text-rose-600/90">0</p>
      </div>
    </section>
    <hr class="border-gray-700/50 py-6">
    <!-- \\\===available-jobs===/// -->
    <section class="available-jobs">
      <div class="flex flex-col md:flex-row justify-between items-start md:text-center gap-4 mb-6">
        <div class="text-left">
          <h2 class="text-xl font-bold text-white">Available Jobs</h2>
          <div id="list-container" class="flex gap-3 mt-4">
            <button onclick="switchTab('all')" id="all-btn"
              class="btn-tab active px-6 py-2 rounded-lg text-sm font-medium transition-all">All</button>
            <button onclick="switchTab('interview')" id="interview-btn"
              class="btn-tab px-6 py-2 rounded-lg text-sm font-medium transition-all">Interview</button>
            <button onclick="switchTab('rejected')" id="rejected-btn"
              class="btn-tab px-6 py-2 rounded-lg text-sm font-medium transition-all">Rejected</button>
          </div>
        </div>
        <div class="text-gray-300 font-medium">
          <span id="total-list-count">0</span> of <span id="list-count">8</span> Jobs
        </div>
      </div>
    </section>

    <div id="job-list-container" class="min-h-[400px]">
      <!--jobs card will be shown here via clone, do not want innerHtml, cz it becomes hijibiji-->
    </div>


    <!--no jobs available-->
    <div id="no-jobs-card" class="hidden">
      <div
        class="flex flex-col -mt-96 items-center justify-center min-h-[400px] text-center rounded-3xl bg-gray-800/50 border border-dashed border-gray-500">
        <div
          class="bg-gray-700/50 size-20 rounded-xl flex items-center justify-center mb-4 transition-transform hover:scale-105">
          <img src="/jobs.png" class="size-16" alt="">
        </div>
        <h3 class="text-xl font-bold text-white mb-1">No Jobs Available</h3>
        <p class="text-gray-400 text-base">Check back soon for new job opportunities.</p>
      </div>
    </div>


    <div class="job-card-container hidden">
      <div class="job-card relative bg-gradient-to-bl from-gray-900/50 via-gray-700/40 to-gray-900/50 p-6 
      rounded-4xl shadow-md mb-4 transition-all hover:shadow-xl hover:scale-[1.00] duration-300
      text-gray-200 border-2 border-white/10 hover:from-gray-800/80 hover:via-gray-900/30 hover:to-gray-800/80">
        <button id="delete-btn"
          class="absolute top-6 right-6 text-gray-400 hover:text-rose-500 transition-colors duration-300">
          <i class="fa-solid fa-trash-can text-lg"></i>
        </button>
        <div class="company-info mb-4">
          <h3 class="company-name text-xl mb-1 font-bold text-white"></h3>
          <p class="job-position text-gray-300 text-sm"></p>
        </div>
        <div class="job-details flex flex-wrap gap-x-4 gap-y-2 text-sm text-gray-400 mb-4">
          <span class="flex items-center gap-2"><i class="fa-solid fa-location-arrow"></i>
            <p class="job-location"></p>
          </span>
          <span class="flex items-center gap-2"><i class="fa-solid fa-hourglass"></i>
            <p class="job-type"></p>
          </span>
          <span class="flex items-center gap-2"><i class="fa-solid fa-bangladeshi-taka-sign"></i>
            <p class="job-salary"></p>
          </span>
        </div>

        <div class="job-status-btn mb-4">
          <button
            class="job-status-badge btn btn-sm bg-gray-700/50 text-white/60 text-xs font-semibold rounded-md uppercase tracking-wide border border-purple-600/50"></button>
          <button
            class="interview-status-badge btn btn-sm bg-green-500/50 text-white/80 text-xs font-semibold rounded-md uppercase tracking-wide border border-dashed border-green-400"></button>
          <button
            class="rejected-status-badge btn btn-sm bg-red-500/50 text-white/80 text-xs font-semibold rounded-md uppercase tracking-wide border border-dashed border-red-400"></button>
        </div>
        <p class="job-description text-sm text-gray-400 leading-relaxed mb-6 line-clamp-2 md:line-clamp-none"></p>
        <div class="flex gap-4">
          <button class="interview-btn btn btn-sm bg-indigo-500/70 text-xs font-semibold rounded-md uppercase tracking-wide border-0 hover:bg-indigo-600 hover:text-white">Interview</button>
          <button class="rejected-btn btn btn-sm bg-rose-500/70 text-xs font-semibold rounded-md uppercase tracking-wide border-0 hover:bg-red-600 hover:text-white">Rejected</button>
        </div>
      </div>
    </div>

  </div>
  <!-- Scripts -->
  <script src="/machine.js"></script>
  <script src="/script.js"></script>
</body>

</html>
